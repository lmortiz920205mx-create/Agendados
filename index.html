<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Platino Admin</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2b4c">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; padding:15px; }
.btn-main { background:#1a2b4c; color:white; padding:12px; width:100%; border:none; border-radius:8px; margin-top:5px; }
.servicio-card { background:white; padding:10px; margin:10px 0; border-left:5px solid #1a2b4c; }
</style>
</head>

<body>

<h2>TAXI PLATINO</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="domicilio" placeholder="Domicilio">
<input type="datetime-local" id="fecha">

<button class="btn-main" onclick="procesarServicio()">GUARDAR</button>

<div id="lista"></div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCV432quSSYBQnvyVNoc7rXhw99x7UlMHg",
  authDomain: "taxi-platino-95ea3.firebaseapp.com",
  projectId: "taxi-platino-95ea3",
  storageBucket: "taxi-platino-95ea3.firebasestorage.app",
  messagingSenderId: "981982270950",
  appId: "1:981982270950:web:b7d0b4ca9ab03cafd97227"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const serviciosRef = collection(db, "servicios");

let servicios = [];

// 🔄 TIEMPO REAL
onSnapshot(serviciosRef, (snapshot) => {
    servicios = [];
    snapshot.forEach(docSnap => {
        servicios.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });
    render();
});

// 💾 GUARDAR
window.procesarServicio = async function() {

    const nombre = document.getElementById('nombre').value;
    const telefono = document.getElementById('telefono').value;
    const domicilio = document.getElementById('domicilio').value;
    const fecha = document.getElementById('fecha').value;

    if(!nombre || !domicilio || !fecha){
        return Swal.fire('Faltan datos');
    }

    await addDoc(serviciosRef, {
        nombre,
        telefono,
        domicilio,
        fecha,
        estado: 'pendiente',
        unidad: 'N/A'
    });

    document.getElementById('nombre').value = "";
    document.getElementById('telefono').value = "";
    document.getElementById('domicilio').value = "";
    document.getElementById('fecha').value = "";
};

// ✏️ FINALIZAR
window.finalizar = async function(id){
    await updateDoc(doc(db,"servicios",id),{
        estado:'finalizado'
    });
};

// 🚕 ASIGNAR UNIDAD
window.asignar = async function(id){
    const { value } = await Swal.fire({
        title:"Unidad",
        input:"text"
    });

    if(value){
        await updateDoc(doc(db,"servicios",id),{
            unidad:value,
            estado:"proceso"
        });
    }
};

// 🗑 ELIMINAR
window.eliminar = async function(id){
    await deleteDoc(doc(db,"servicios",id));
};

// 🎨 RENDER
function render(){
    const lista = document.getElementById('lista');
    lista.innerHTML = "";

    servicios.forEach(s=>{
        const div = document.createElement('div');
        div.className = "servicio-card";

        div.innerHTML = `
            <b>${s.nombre}</b><br>
            ${s.domicilio}<br>
            ${s.fecha}<br>
            Estado: ${s.estado}<br>
            Unidad: ${s.unidad}<br><br>

            <button onclick="asignar('${s.id}')">Unidad</button>
            <button onclick="finalizar('${s.id}')">Finalizar</button>
            <button onclick="eliminar('${s.id}')">Eliminar</button>
        `;

        lista.appendChild(div);
    });
}

</script>

</body>
</html>
