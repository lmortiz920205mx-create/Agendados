<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Platino Admin</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2b4c">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root { --azul:#1a2b4c; --plata:#f4f4f4; --rojo:#d32f2f; --amarillo:#fbc02d; --verde:#388e3c; }
body { font-family:sans-serif; background:var(--plata); margin:0; padding:15px; }

.header { text-align:center; background:var(--azul); color:#fff; padding:15px; margin:-15px -15px 20px; }

.form-card, .servicio-card {
    background:#fff; padding:15px; border-radius:10px; margin-bottom:15px;
}

input, select {
    width:100%; padding:12px; margin:8px 0;
}

.btn-main {
    width:100%; padding:14px; background:var(--azul); color:#fff; border:none;
}

.servicio-card { border-left:8px solid; }
.pendiente { border-color:var(--amarillo); }
.en-proceso { border-color:var(--verde); }
.finalizado { border-color:#999; opacity:0.6; }

.urgente { background:#ffebee; animation:blink 1s infinite; }
@keyframes blink { 50% { opacity:0.6; } }
</style>
</head>

<body onclick="desbloquearAudio()">

<audio id="audioAlerta" src="alerta.mp3"></audio>

<div class="header">
<h2>TAXI PLATINO</h2>
</div>

<div class="form-card">
<input type="hidden" id="edit-id">

<input id="nombre" placeholder="Cliente">
<input id="telefono" placeholder="Teléfono">
<input id="domicilio" placeholder="Domicilio">
<input type="datetime-local" id="fecha">

<button class="btn-main" onclick="procesarServicio(true)">GUARDAR</button>
<button class="btn-main" onclick="exportarExcel()">EXCEL</button>
</div>

<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_AUTH",
projectId: "TU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.db = db;
window.fb = { collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy };

onAuthStateChanged(auth, user => {
    if(user) init();
    else login();
});

async function login(){
    const { value } = await Swal.fire({
        title:'Login',
        html:`<input id="u" class="swal2-input"><input id="p" type="password" class="swal2-input">`,
        preConfirm:()=>[u.value,p.value]
    });

    if(value){
        signInWithEmailAndPassword(auth,value[0],value[1])
        .catch(()=>Swal.fire('Error','Credenciales incorrectas','error'));
    }
}
</script>

<script>
let servicios = [];
const audio = document.getElementById('audioAlerta');
let audioOK = false;

function desbloquearAudio(){
    if(!audioOK){
        audio.play().then(()=>{audio.pause(); audioOK=true;}).catch(()=>{});
    }
}

function init(){
    const q = fb.query(fb.collection(db,"servicios"), fb.orderBy("fecha","asc"));

    fb.onSnapshot(q, snap=>{
        servicios=[];
        snap.forEach(d=>servicios.push({...d.data(),id:d.id}));
        render();
    });
}

function render(){
    const lista = document.getElementById('lista');
    lista.innerHTML="";

    const ahora = Date.now();
    const limite = ahora + (15*60*1000);

    servicios.forEach(s=>{
        const urgente = s.fecha >= ahora && s.fecha <= limite;

        const div = document.createElement('div');
        div.className = `servicio-card ${s.estado} ${urgente?'urgente':''}`;

        div.innerHTML = `
        <b>${s.nombre}</b><br>
        📍 ${s.domicilio}<br>
        ⏰ ${new Date(s.fecha).toLocaleString()}
        `;

        lista.appendChild(div);
    });

    if(audioOK) audio.play().catch(()=>{});
}

async function procesarServicio(notificar){

    const data = {
        nombre: nombre.value,
        telefono: telefono.value,
        domicilio: domicilio.value,
        fecha: new Date(fecha.value).getTime(),
        estado:'pendiente'
    };

    if(!data.nombre || !/^\d{10}$/.test(data.telefono)){
        return Swal.fire('Error','Datos inválidos','error');
    }

    const id = edit-id.value || Date.now().toString();

    await fb.setDoc(fb.doc(db,"servicios",id), data);

    if(notificar){

        const fechaObj = new Date(data.fecha);

        const mensaje =
`🚕 NUEVO SERVICIO
👤 Cliente: ${data.nombre}
📍 Origen: ${data.domicilio}
⏰ Hora: ${fechaObj.toLocaleString()}`;

        window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    limpiar();
}

function limpiar(){
    nombre.value="";
    telefono.value="";
    domicilio.value="";
    fecha.value="";
}

function exportarExcel(){
    const ws = XLSX.utils.json_to_sheet(servicios);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Servicios");
    XLSX.writeFile(wb, "TaxiPlatino.xlsx");
}

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>

</body>
</html>
