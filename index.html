<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Platino Admin</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <meta name="theme-color" content="#1a2b4c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #1a2b4c; --plata: #f4f4f4; --rojo: #d32f2f; --amarillo: #fbc02d; --verde: #388e3c; --texto: #333; }
        
        /* Estilo base restaurado según captura */
        body { font-family: 'Segoe UI', sans-serif; background: var(--plata); margin: 0; padding: 15px; padding-bottom: 80px; color: var(--texto); display: none; }
        
        .header { 
            text-align: center; background: var(--azul); color: white; padding: 25px 15px; 
            border-radius: 0 0 15px 15px; margin: -15px -15px 20px -15px; position: relative;
        }
        
        /* Botones de cabecera restaurados */
        .header-btn { 
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.15); border: none; border-radius: 50%; 
            width: 45px; height: 45px; color: white; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        #btnLogout { left: 15px; }
        #btnSonido { right: 15px; }

        .form-card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; border-top: 5px solid var(--azul); 
        }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        .btn-main { background: var(--azul); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        /* Colores de botones según captura */
        .btn-save { background: #2ecc71; }
        .btn-excel { background: #1D6F42; }
        .btn-clear { background: #7f8c8d; }

        #searchBar { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }

        .servicio-card { background: white; margin-bottom: 15px; border-radius: 12px; padding: 18px; border-left: 10px solid; box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .pendiente { border-left-color: var(--amarillo); }
        .en-proceso { border-left-color: var(--verde); background: #f9fff9; }
        .finalizado { border-left-color: #9e9e9e; opacity: 0.7; }
        .urgente-blink { border-left-color: #ff0000 !important; background-color: #ffebee !important; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.6; } }

        .acciones { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .btn-acc { padding: 10px 2px; border: none; border-radius: 5px; color: white; font-size: 9px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .bg-ws { background: #25D366; } .bg-map { background: #4285F4; } .bg-edit { background: #78909c; } .bg-fin { background: var(--rojo); } .bg-del { background: #333; }

        #loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1a2b4c;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-box {
    text-align: center;
    animation: fade 1.5s infinite alternate;
}

@keyframes fade {
    from { opacity: 0.5; }
    to { opacity: 1; }
}
#app-content {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { 
        opacity: 0; 
        transform: translateY(10px); 
    }
    to { 
        opacity: 1; 
        transform: translateY(0); 
    }
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ddd;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
}

.tab-btn.active {
    background: #1a2b4c;
    color: white;
}
.tab-btn[data-tab="pendiente"].active {
    background: #fbc02d;
    color: black;
}

.tab-btn[data-tab="en-proceso"].active {
    background: #2ecc71;
    color: white;
}

.tab-btn[data-tab="finalizado"].active {
    background: #616161;
    color: white;
}

.dias-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}

.dia {
    flex: 1 0 12%;
    min-width: 40px;
}

.dia input {
    display: none;
}

.dia span {
    display: block;
    padding: 10px 0;
    border-radius: 12px;
    background: #f1f2f6;
    font-weight: 600;
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
}

/* Hover */
.dia span:hover {
    background: #dfe6e9;
}

/* Activo (más pro 🔥) */
.dia input:checked + span {
    background: linear-gradient(135deg, #1a2b4c, #2c3e70);
    color: #fff;
    border: 1px solid #1a2b4c;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transform: scale(1.08);
}

.dia span {
    user-select: none;
}

.dia span:active {
    transform: scale(0.95);
}

.bloque-rec {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transform: translateY(-10px);
    transition: all 0.3s ease;
}

.bloque-rec.activo {
    max-height: 200px;
    opacity: 1;
    transform: translateY(0);
    margin-top: 10px;
}

.acciones-dias {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn-dia-action {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
}

/* Seleccionar todos */
.btn-all {
    background: #2ecc71;
    color: white;
}

.btn-all:hover {
    background: #27ae60;
}

/* Limpiar */
.btn-clear {
    background: #e0e0e0;
    color: #333;
}

.btn-clear:hover {
    background: #bdbdbd;
}

.btn-dia-action:active {
    transform: scale(0.95);
}
    </style>
</head>
<body id="mainBody">

    <div id="loader">
    <div class="loader-box">
        <h2>TAXI PLATINO</h2>
        <p>Cargando sistema...</p>
    </div>
</div>

<audio id="audioAlerta" src="alerta.mp3" preload="auto"></audio>

<div id="app-content">
    <div class="header">


        <button id="btnLogout" class="header-btn">🚪</button>
        <h2 style="margin:0">TAXI PLATINO</h2>
        <small>CENTRAL MINATITLÁN</small>
<br>
<small id="rolUser"></small>
        <button id="btnSonido" class="header-btn">🔇</button>
    </div>

    <button id="btnRol" class="btn-main" style="background:#6c5ce7;">
👑 REGISTRAR OPERADOR
</button>

    <div class="form-card" id="formulario">
        <input type="hidden" id="edit-id">
        <input type="text" id="nombre" placeholder="Nombre del Cliente">
        <input type="tel" id="telefono" placeholder="📱 WhatsApp (10 dígitos)" maxlength="10">
        <input type="text" id="domicilio" placeholder="📍 Domicilio de Origen">
        <div style="display: flex; gap: 10px;">
    <input type="datetime-local" id="fecha" style="flex: 2;">
    <select id="recurrencia" style="flex: 1.5;">
        <option value="no">Servicio Único</option>
        <option value="diario">Repetir cada 24h</option>
    </select>
</div>

<div id="bloqueRecurrencia" class="bloque-rec">
<div id="diasSemana" class="dias-container">
    <label class="dia">
        <input type="checkbox" value="1">
        <span>L</span>
    </label>
    <label class="dia">
        <input type="checkbox" value="2">
        <span>M</span>
    </label>
    <label class="dia">
        <input type="checkbox" value="3">
        <span>Mi</span>
    </label>
    <label class="dia">
        <input type="checkbox" value="4">
        <span>J</span>
    </label>
    <label class="dia">
        <input type="checkbox" value="5">
        <span>V</span>
    </label>
    <label class="dia">
        <input type="checkbox" value="6">
        <span>S</span>
    </label>
    <label class="dia">
        <input type="checkbox" value="0">
        <span>D</span>
    </label>
    <div class="acciones-dias">
    <button type="button" id="btnTodos" class="btn-dia-action btn-all">
        ✓ Todos
    </button>
    <button type="button" id="btnLimpiarDias" class="btn-dia-action btn-clear">
        ✕ Limpiar
    </button>
</div>

    <small id="resumenDias"></small>
</div>
</div>
        <button class="btn-main btn-save" id="btnGuardar">💾 GUARDAR Y NOTIFICAR</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-main btn-excel" id="btnExcel">📊 EXCEL</button>
            <button class="btn-main btn-clear" id="btnLimpiar">🧹 LIMPIAR</button>
        </div>
        <button id="btn-cancel" style="display:none; color:red; width:100%; margin-top:10px; border:none; background:none; font-weight:bold; cursor:pointer;">✖ CANCELAR EDICIÓN</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Buscar por nombre o domicilio...">

    <div id="tabs" style="display:flex; gap:5px; margin-bottom:15px;">
    <button class="tab-btn active" data-tab="pendiente">🟡 Pendientes</button>
    <button class="tab-btn" data-tab="en-proceso">🟢 En proceso</button>
    <button class="tab-btn" data-tab="finalizado">⚫ Finalizados</button>
</div>

    <div id="lista"></div>
</div>

<script type="module">
    window.onerror = function(message, source, lineno, colno, error) {
    console.error("ERROR GLOBAL:", message);
};
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, deleteDoc, doc, setDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCV432quSSYBQnvyVNoc7rXhw99x7UlMHg",
        authDomain: "taxi-platino-95ea3.firebaseapp.com",
        projectId: "taxi-platino-95ea3",
        storageBucket: "taxi-platino-95ea3.firebasestorage.app",
        messagingSenderId: "981982270950",
        appId: "1:981982270950:web:b7d0b4ca9ab03cafd97227"
    };

    const app = initializeApp(firebaseConfig);
    const functions = getFunctions(app);
    const asignarRol = httpsCallable(functions, "asignarRolOperador");
    const db = getFirestore(app);
    const auth = getAuth(app);
    const messaging = getMessaging(app);

    let servicios = [];
    let userRole = null;
    let audioHabilitado = false;
    let audio;
    let tabActual = "pendiente";
    let intervaloRender = null;
    let elementosDOM = {};
    let sonidoActivo = false;
    let ultimoUrgenteId = null;

window.addEventListener('DOMContentLoaded', () => {
    audio = document.getElementById('audioAlerta');
});

    // --- CORRECCIÓN DE LOGIN Y VISIBILIDAD ---
    onAuthStateChanged(auth, async user => {

    const loader = document.getElementById('loader') || { style: {}, innerHTML: "" };

    if (user) {
        try {
            // Obtener rol
            const token = await user.getIdTokenResult();
            userRole = token.claims.role || "operador";

            console.log("ROL:", userRole);

            await activarNotificaciones();

            // Mostrar rol
            document.getElementById('rolUser').innerText =
                userRole === "admin" ? "👑 ADMIN" : "👨‍💼 OPERADOR";

            // Ocultar loader
            loader.style.display = "none";

            // Mostrar app
            document.getElementById('mainBody').style.display = "block";

            inicializarApp();

        } catch (error) {
            console.error(error);
            loader.innerHTML = "<p>Error al cargar</p>";
        }

    } else {
        // Usuario no logueado

        loader.style.display = "none"; // quitar loader

        document.getElementById('mainBody').style.display = "block";

        login();
    }
});

    async function login() {
    const { value: v } = await Swal.fire({
        title: '🔐 ACCESO TAXI PLATINO',
        html: `
            <input id="u" class="swal2-input" placeholder="Correo">
            <input id="p" type="password" class="swal2-input" placeholder="Contraseña">
        `,
        confirmButtonText: "Entrar",
        confirmButtonColor: '#1a2b4c',
        allowOutsideClick: false,
        preConfirm: () => {
            const email = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            if (!email || !pass) {
                Swal.showValidationMessage("Completa todos los campos");
                return false;
            }

            return [email, pass];
        }
    });

    if (v) {
        try {
            await signInWithEmailAndPassword(auth, v[0], v[1]);
        } catch (e) {
            Swal.fire('Error', 'Credenciales incorrectas', 'error');
            login();
        }
    }
}

    document.getElementById('btnLogout').onclick = () => {
        Swal.fire({ title: '¿Cerrar sesión?', showCancelButton: true, confirmButtonColor: '#d33' }).then(r => {
            if(r.isConfirmed) signOut(auth);
        });
    };

    // --- AUDIO ---
    document.getElementById('btnSonido').onclick = (e) => {
        audioHabilitado = !audioHabilitado;
        e.target.innerText = audioHabilitado ? "🔊" : "🔇";
        if(audioHabilitado) audio.play().then(() => audio.pause());
        else audio.pause();
    };

    async function activarNotificaciones() {
    try {
        const permiso = await Notification.requestPermission();

        if (permiso !== "granted") {
            console.log("Permiso denegado");
            return;
        }

        const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');

const token = await getToken(messaging, {
  vapidKey: "BOiwH3kCXA24-2Sdi7fTYbx2H3EL6oAgBzqtSpaK-1xlwc4kerPYy0YF7uzPme1zo3fO2jo8WGm52j6VbU0-2vc",
  serviceWorkerRegistration: registration
});

        console.log("TOKEN:", token);

        // 🔥 IMPORTANTE: guardar token en Firestore
        if (auth.currentUser) {
            await setDoc(doc(db, "tokens", auth.currentUser.uid), {
    token: token,
    role: userRole || "admin"
});
        }

    } catch (error) {
        console.error("Error notificaciones:", error);
    }
}

    function inicializarApp() {
    const q = query(collection(db, "servicios"), orderBy("fecha", "asc"));

    onSnapshot(q, snap => {
        servicios = [];
        snap.forEach(d => servicios.push({ ...d.data(), id: d.id }));

        actualizarContadores();
        
        render(document.getElementById('searchBar').value.toLowerCase());

        function actualizarContadores() {
    const pendientes = servicios.filter(s => s.estado === "pendiente").length;
    const proceso = servicios.filter(s => s.estado === "en-proceso").length;
    const finalizados = servicios.filter(s => s.estado === "finalizado").length;
    const ahora = Date.now();
    const urgentes = servicios.filter(s =>
    s.estado === 'pendiente' &&
    s.fecha <= ahora + (15 * 60 * 1000) &&
    s.fecha >= ahora - 600000
).length;
    const tabPendiente = document.querySelector('[data-tab="pendiente"]');

if (pendientes > 0) {
    tabPendiente.classList.add('tab-alerta');
} else {
    tabPendiente.classList.remove('tab-alerta');
}

    document.querySelector('[data-tab="pendiente"]').innerText = `🟡 Pendientes (${pendientes})`;
    document.querySelector('[data-tab="en-proceso"]').innerText = `🟢 En proceso (${proceso})`;
    document.querySelector('[data-tab="finalizado"]').innerText = `⚫ Finalizados (${finalizados})`;
    const tabPend = document.querySelector('[data-tab="pendiente"]');

if (urgentes > 0) {
    tabPend.style.background = "#ff0000";
    tabPend.style.color = "white";
} else {
    tabPend.style.background = "";
    tabPend.style.color = "";
}

// 🔥 AUTO CAMBIO DE PESTAÑA
if (urgentes > 0 && tabActual !== 'pendiente') {
    tabActual = 'pendiente';
    render(document.getElementById('searchBar').value.toLowerCase());
}
}    });

    if (!intervaloRender) {
        intervaloRender = setInterval(() => {
            render(document.getElementById('searchBar').value.toLowerCase());
        }, 5000);

}}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
        tabActual = btn.dataset.tab;

        // cambiar botón activo
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        render(document.getElementById('searchBar').value.toLowerCase());
    };
});

    let debounceTimer;

document.getElementById('searchBar').oninput = (e) => {
    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {
        render(e.target.value.toLowerCase());
    }, 300);
};

    function render(filtro = "") {
    try {
        const lista = document.getElementById('lista');
        lista.innerHTML = "";

        const fragment = document.createDocumentFragment();

        const ahora = Date.now();
        const quinceMin = ahora + (15 * 60 * 1000);
        let hayUrgente = false;

       const filtrados = servicios.filter(s =>
    s.estado === tabActual &&
    (
        (s.nombre || "").toLowerCase().includes(filtro) ||
        (s.domicilio || "").toLowerCase().includes(filtro)
    )
);
    
        const prioridad = {
            'pendiente': 1,
            'en-proceso': 2,
            'finalizado': 3        };

        filtrados.forEach(s => {

    let div = elementosDOM[s.id];

    const esUrgente =
        s.estado === 'pendiente' &&
        s.fecha <= quinceMin &&
        s.fecha >= ahora - 600000;

        if (esUrgente) hayUrgente = true;

    const fechaObj = new Date(s.fecha || Date.now());
    const fechaTxt = fechaObj.toLocaleString('es-MX', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });

    const minutosRestantes = Math.floor((s.fecha - ahora) / 60000);

    // 🆕 SI NO EXISTE, CREAR
    if (!div) {
        div = document.createElement('div');
        elementosDOM[s.id] = div;
    }

    // 🆕 SOLO ACTUALIZA CONTENIDO
    div.className = `servicio-card ${s.estado} ${esUrgente ? 'urgente-blink' : ''}`;

    div.innerHTML = `
        <small style="${minutosRestantes <= 15 && minutosRestantes >= 0 && s.estado === 'pendiente' ? 'color:red;' : ''}">
            ${
                minutosRestantes <= 15 && minutosRestantes >= 0 && s.estado === 'pendiente'
                ? `⏰ <b>${minutosRestantes} min</b> - ${fechaTxt}`
                : `📅 ${fechaTxt}`
            }
        </small><br>

        <b>${(s.nombre || "").toUpperCase()}</b><br>
        <div>📍 ${s.domicilio || ""}</div>
        <div>🚕 Unidad: <b>${s.unidad || "S/A"}</b></div>

        <div class="acciones">
            <button class="btn-acc bg-ws" data-id="${s.id}" data-tel="${s.telefono || ""}">TAXI</button>
            <button class="btn-acc bg-map" data-dom="${s.domicilio || ""}">MAPA</button>
            <button class="btn-acc bg-edit" data-id="${s.id}">EDIT</button>
            <button class="btn-acc bg-fin" data-id="${s.id}">FIN</button>
            <button class="btn-acc bg-del" data-id="${s.id}">DEL</button>
        </div>
    `;

    fragment.appendChild(div);
});

Object.keys(elementosDOM).forEach(id => {
    if (!servicios.find(s => s.id === id)) {
        if (elementosDOM[id]?.parentNode) {
            elementosDOM[id].remove();
        }
        delete elementosDOM[id];
    }
});

        lista.appendChild(fragment);

        // AUDIO
        if (audio) {
            if (hayUrgente && audioHabilitado) {
    if (!sonidoActivo) {
        audio.play().catch(() => {});
        sonidoActivo = true;
    }
} else {
    audio.pause();
    sonidoActivo = false;
}
        }

        if (hayUrgente && navigator.vibrate) {
    navigator.vibrate([200, 100, 200]);
}


        aplicarPermisosUI();

    } catch (err) {
        console.error("Error en render:", err);
    }}
    
    function borradorRapido() {
        ['edit-id', 'nombre', 'telefono', 'domicilio', 'fecha'].forEach(i => document.getElementById(i).value = "");
        document.getElementById('btn-cancel').style.display = "none";
    }

function aplicarPermisosUI() {

    // ELIMINAR (solo admin)
    document.querySelectorAll('.bg-del').forEach(btn => {
        btn.style.display = (userRole === "admin") ? "block" : "none";
    });

    // FINALIZAR (admin y operador)
    document.querySelectorAll('.bg-fin').forEach(btn => {
        btn.style.display = "block";
    });

    // EDITAR (todos)
    document.querySelectorAll('.bg-edit').forEach(btn => {
        btn.style.display = "block";
    });

    // TAXI (todos)
    document.querySelectorAll('.bg-ws').forEach(btn => {
        btn.style.display = "block";
    });

    // MAPA (todos)
    document.querySelectorAll('.bg-map').forEach(btn => {
        btn.style.display = "block";
    });

    // EXCEL (solo admin)
    document.getElementById('btnExcel').style.display =
        (userRole === "admin") ? "block" : "none";
}

    document.addEventListener('click', async e => {
    const t = e.target;

    if(t.classList.contains('bg-ws')) {
        const { value: u } = await Swal.fire({ title: 'Unidad:', input: 'text' });
        if(u) {
            await setDoc(doc(db, "servicios", t.dataset.id), { unidad: u, estado: 'en-proceso' }, { merge: true });
            if(/^\d{10}$/.test(t.dataset.tel)) {
                const msgCliente = `🚖 *TAXI PLATINO*

Hola, su servicio ya fue asignado ✅

🚕 *Unidad:* ${u}

📍 El operador va en camino a su ubicación.

⏳ Por favor esté pendiente.

🙏 Gracias por confiar en nosotros`;

window.open(`https://wa.me/52${t.dataset.tel}?text=${encodeURIComponent(msgCliente)}`, '_blank');
            }
        }
    }

    if(t.classList.contains('bg-map')) {
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.dataset.dom + ' Minatitlán')}`, '_blank');
    }

    if(t.classList.contains('bg-edit')) {
        const s = servicios.find(x => x.id === t.dataset.id);
if(!s) return;
        document.getElementById('edit-id').value = s.id;
        document.getElementById('nombre').value = s.nombre;
        document.getElementById('telefono').value = s.telefono;
        document.getElementById('domicilio').value = s.domicilio;
        const fechaLocal = new Date(s.fecha);
document.getElementById('fecha').value =
    new Date(fechaLocal.getTime() - fechaLocal.getTimezoneOffset() * 60000)
    .toISOString()
    .slice(0,16);
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);    }

            if(t.classList.contains('bg-fin')) {
    await setDoc(doc(db, "servicios", t.dataset.id),
        { estado: 'finalizado' },
        { merge: true }
    );
}

    if(t.classList.contains('bg-del')) {

        if(userRole !== "admin") {
            return Swal.fire('Acceso denegado');
        }

        const r = await Swal.fire({ title: '¿Borrar?', showCancelButton: true });

        if(r.isConfirmed) {
            await deleteDoc(doc(db, "servicios", t.dataset.id));
        }
    }
})

    // ================================
// BOTONES PRINCIPALES
// ================================

// REGISTRAR OPERADOR
document.getElementById('btnRol').onclick = async () => {
    if (userRole !== "admin") {
        return Swal.fire("Acceso denegado");
    }

    const { value: uid } = await Swal.fire({
        title: 'UID del usuario',
        input: 'text',
        inputPlaceholder: 'yU9hs1mN3MOngSU0B2CAe8beWhI2'
    });

    if (!uid) return;

    try {
        await asignarRol({ uid });
        Swal.fire({
            icon: 'success',
            title: 'Listo',
            text: 'Ahora es operador'
        });
    } catch (e) {
        console.error(e);
        Swal.fire({
            icon: 'error',
            title: 'Error',
            text: e.message
        });
    }
};

// GUARDAR Y NOTIFICAR
document.getElementById('btnGuardar').onclick = async () => {
    const nom = document.getElementById('nombre').value;
    const fec = document.getElementById('fecha').value;
    if (!nom || !fec) return Swal.fire('Error', 'Datos incompletos', 'warning');

    const id = document.getElementById('edit-id').value || crypto.randomUUID();
    const tipoRec = document.getElementById('recurrencia').value;

let dias = [];

if (tipoRec === 'diario') {
    dias = Array.from(document.querySelectorAll('#diasSemana input:checked'))
        .map(c => parseInt(c.value));

    if (dias.length === 0) {
        return Swal.fire('Error', 'Selecciona al menos un día', 'warning');
    }
}

const data = {
    nombre: nom,
    telefono: document.getElementById('telefono').value,
    domicilio: document.getElementById('domicilio').value,
    fecha: new Date(fec).getTime(),
    recurrencia: tipoRec,
    dias: dias,
    estado: 'pendiente',
    unidad: 'S/A',
    notificado: false
};

    await setDoc(doc(db, "servicios", id), data, { merge: true });

    // Enviar WhatsApp
    const f = new Date(data.fecha);
    const horaFormateada = f.toLocaleString('es-MX', {
        day: 'numeric',
        month: 'numeric',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
    });

    const msg = `🚕 *NUEVO SERVICIO*\n\n👤 *Cliente:* ${nom}\n📍 *Origen:* ${data.domicilio || "Sin ubicación"}\n⏰ *Hora:* ${horaFormateada}\n\n⚠️ *Estado:* PENDIENTE`;

    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');

    borradorRapido();
};

// LIMPIAR FORMULARIO
document.getElementById('btnLimpiar').onclick = borradorRapido;
document.getElementById('btn-cancel').onclick = borradorRapido;

// EXPORTAR A EXCEL
document.getElementById('btnExcel').onclick = () => {
    const ws = XLSX.utils.json_to_sheet(servicios.map(s => ({
        Fecha: new Date(s.fecha).toLocaleString(),
        Cliente: s.nombre,
        Unidad: s.unidad,
        Estado: s.estado
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Servicios");
    XLSX.writeFile(wb, "Reporte_Platino.xlsx");
};
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./firebase-messaging-sw.js')
        .then(() => console.log("SW registrado"))
        .catch(err => console.error("SW error:", err));
}
    onMessage(messaging, payload => {
    console.log("Notificación recibida:", payload);

    if (payload?.notification) {
        new Notification(payload.notification.title, {
            body: payload.notification.body
        });
    }
});

const checkboxesDias = document.querySelectorAll('#diasSemana input');
const bloqueRecurrencia = document.getElementById('bloqueRecurrencia');
const selectRecurrencia = document.getElementById('recurrencia');

// cambio de tipo de servicio
selectRecurrencia.addEventListener('change', (e) => {

    if (e.target.value === 'diario') {
        bloqueRecurrencia.classList.add('activo');
    } else {
        bloqueRecurrencia.classList.remove('activo');

        // limpiar días automáticamente
        checkboxesDias.forEach(c => c.checked = false);
        actualizarResumenDias();
    }

});

// botones
document.getElementById('btnTodos').onclick = () => {
    checkboxesDias.forEach(c => c.checked = true);
    actualizarResumenDias();
};

document.getElementById('btnLimpiarDias').onclick = () => {
    checkboxesDias.forEach(c => c.checked = false);
    actualizarResumenDias();
};

// resumen
function actualizarResumenDias() {
    const diasTexto = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

    const seleccionados = Array.from(checkboxesDias)
        .filter(c => c.checked)
        .map(c => diasTexto[c.value]);

    document.getElementById('resumenDias').innerText =
        seleccionados.length
            ? `🔁 ${seleccionados.length} día(s): ${seleccionados.join(', ')}`
            : "";
}

// estado inicial (IMPORTANTE)
bloqueRecurrencia.classList.remove('activo');  
// oculto al iniciar
bloqueRecurrencia.classList.remove('activo');
</script>
