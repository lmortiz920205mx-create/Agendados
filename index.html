<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Platino Cloud v5</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body { font-family: sans-serif; background:#f4f4f4; padding:10px; }
.form { background:#fff; padding:10px; border-radius:10px; margin-bottom:15px; }
input, select, button { width:100%; margin:5px 0; padding:10px; }
.card { background:#fff; padding:10px; border-left:5px solid orange; margin-bottom:10px; border-radius:8px;}
</style>
</head>

<body>

<div class="form">
<input id="nombre" placeholder="Nombre">
<input id="domicilio" placeholder="Domicilio">
<input type="datetime-local" id="fecha">
<select id="recurrencia">
<option value="unico">Único</option>
<option value="diario">Diario</option>
</select>
<button onclick="guardar()">Guardar</button>
</div>

<div id="lista"></div>

<script>
const firebaseConfig = { 
apiKey: "TU_API_KEY",
authDomain: "TU_AUTH_DOMAIN",
databaseURL: "TU_DATABASE_URL",
projectId: "TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function guardar() {
    const id = Date.now().toString();
    const nom = nombre.value;
    const dom = domicilio.value;
    const fec = fecha.value;
    const rec = recurrencia.value;

    if(!nom || !dom || !fec){
        Swal.fire("Error","Faltan datos","error");
        return;
    }

    const msg = `NUEVO\n${nom}\n${fec}\n${dom}`;

    db.ref('servicios/' + id).set({
        id,
        nombre: nom,
        dom,
        fec,
        recurrencia: rec,
        estado: 'pendiente'
    })
    .then(() => {
        window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
        limpiar();
    })
    .catch(err => {
        console.error(err);
        Swal.fire("Error","No se guardó","error");
    });
}

db.ref('servicios').on('value', snap => {
    const data = snap.val();
    console.log("DATA:", data);

    lista.innerHTML = "";

    if(!data){
        lista.innerHTML = "<p>No hay servicios</p>";
        return;
    }

    Object.values(data).forEach(s => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <b>${s.nombre}</b><br>
            ${s.dom}<br>
            ${s.fec}
        `;
        lista.appendChild(div);
    });
});

function limpiar(){
    nombre.value="";
    domicilio.value="";
    fecha.value="";
}
</script>

</body>
</html>
