<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Platino Admin</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <meta name="theme-color" content="#1a2b4c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #1a2b4c; --plata: #f4f4f4; --rojo: #d32f2f; --amarillo: #fbc02d; --verde: #388e3c; --texto: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--plata); margin: 0; padding: 15px; padding-bottom: 80px; color: var(--texto); }
        .header { text-align: center; background: var(--azul); color: white; padding: 15px; border-radius: 0 0 15px 15px; margin: -15px -15px 20px -15px; }
        .form-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; border-top: 5px solid var(--azul); }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: var(--azul); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-excel { background: #1D6F42; }
        .btn-clear { background: #607d8b; }
        .servicio-card { background: white; margin-bottom: 15px; border-radius: 12px; padding: 18px; border-left: 10px solid; box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .pendiente { border-left-color: var(--amarillo); }
        .en-proceso { border-left-color: var(--verde); background: #f9fff9; }
        .finalizado { border-left-color: #9e9e9e; opacity: 0.7; }
        .urgente-blink { border-left-color: #ff0000 !important; background-color: #ffebee !important; animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.6; } }
        .acciones { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .btn-acc { padding: 10px 2px; border: none; border-radius: 5px; color: white; font-size: 9px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .bg-ws { background: #25D366; } .bg-map { background: #4285F4; } .bg-edit { background: #78909c; } .bg-fin { background: var(--rojo); } .bg-del { background: #333; }
    </style>
</head>
<body id="mainBody">

<audio id="audioAlerta" src="alerta.mp3" preload="auto" loop></audio>

<div class="header">
    <h2 style="margin:0">TAXI PLATINO</h2>
    <small>CENTRAL MINATITLÁN</small>
</div>

<div class="form-card" id="formulario">
    <input type="hidden" id="edit-id">
    <input type="text" id="nombre" placeholder="Nombre del Cliente">
    <input type="tel" id="telefono" placeholder="📱 WhatsApp (10 dígitos)" maxlength="10">
    <input type="text" id="domicilio" placeholder="📍 Domicilio de Origen">
    <input type="datetime-local" id="fecha">
    <select id="recurrencia">
        <option value="no">Servicio Único</option>
        <option value="diario">🔁 Repetir cada 24h</option>
    </select>
    <button class="btn-main" style="background:#25D366" id="btnGuardar">💾 GUARDAR Y NOTIFICAR</button>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn-main btn-excel" id="btnExcel">📊 EXCEL</button>
        <button class="btn-main btn-clear" id="btnLimpiar">🧹 LIMPIAR</button>
    </div>
    <button id="btn-cancel" style="display:none; color:red; width:100%; margin-top:10px; border:none; background:none; font-weight:bold; cursor:pointer;">✖ CANCELAR EDICIÓN</button>
</div>

<div id="lista"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, deleteDoc, doc, setDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, getIdTokenResult } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCV432quSSYBQnvyVNoc7rXhw99x7UlMHg",
        authDomain: "taxi-platino-95ea3.firebaseapp.com",
        projectId: "taxi-platino-95ea3",
        storageBucket: "taxi-platino-95ea3.firebasestorage.app",
        messagingSenderId: "981982270950",
        appId: "1:981982270950:web:b7d0b4ca9ab03cafd97227"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let servicios = [];
    let userRole = "operador";
    let audioHabilitado = false;
    const audio = document.getElementById('audioAlerta');

    // --- AUTENTICACIÓN ---
    onAuthStateChanged(auth, async user => { 
        if (user) { 
            const token = await getIdTokenResult(user);
            userRole = token.claims.role || "operador";
            inicializarApp(); 
        } else { 
            login(); 
        } 
    });

    async function login() {
        const { value: v } = await Swal.fire({
            title: 'ACCESO TAXI PLATINO',
            html: '<input id="u" class="swal2-input" placeholder="Correo"><input id="p" type="password" class="swal2-input" placeholder="Contraseña">',
            preConfirm: () => [document.getElementById('u').value, document.getElementById('p').value],
            allowOutsideClick: false
        });
        if(v) signInWithEmailAndPassword(auth, v[0], v[1]).catch(() => {
            Swal.fire('Error', 'Credenciales incorrectas', 'error').then(login);
        });
    }

    // --- LÓGICA DE DATOS ---
    function inicializarApp() {
        const q = query(collection(db, "servicios"), orderBy("fecha", "asc"));
        onSnapshot(q, snap => {
            servicios = [];
            snap.forEach(d => servicios.push({ ...d.data(), id: d.id }));
            render();
        });
    }

    function render() {
        const lista = document.getElementById('lista');
        lista.innerHTML = "";
        const ahora = Date.now();
        const quinceMin = ahora + (15 * 60 * 1000);
        let hayUrgente = false;

        servicios.forEach(s => {
            const esUrgente = (s.estado === 'pendiente' && s.fecha <= quinceMin && s.fecha >= ahora - 600000);
            if(esUrgente) hayUrgente = true;

            const fechaTxt = new Date(s.fecha).toLocaleString('es-MX', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

            const div = document.createElement('div');
            div.className = `servicio-card ${s.estado} ${esUrgente ? 'urgente-blink' : ''}`;
            div.innerHTML = `
                <small>📅 ${fechaTxt}</small><br>
                <b>${s.nombre.toUpperCase()}</b><br>
                📍 ${s.domicilio}<br>
                🚕 Unidad: <b>${s.unidad || 'S/A'}</b>
                <div class="acciones">
                    <button class="btn-acc bg-ws" data-id="${s.id}" data-tel="${s.telefono}">TAXI</button>
                    <button class="btn-acc bg-map" data-dom="${s.domicilio}">MAPA</button>
                    <button class="btn-acc bg-edit" data-id="${s.id}">EDIT</button>
                    <button class="btn-acc bg-fin" data-id="${s.id}">FIN</button>
                    ${userRole === 'admin' ? `<button class="btn-acc bg-del" data-id="${s.id}">BORRAR</button>` : ''}
                </div>
            `;
            lista.appendChild(div);
        });

        if(hayUrgente && audioHabilitado) {
            audio.play().catch(() => {});
        } else {
            audio.pause();
        }
    }

    // --- ACCIONES ---
    async function procesarServicio(notificar) {
        const id = document.getElementById('edit-id').value || Date.now().toString();
        const nombre = document.getElementById('nombre').value;
        const telefono = document.getElementById('telefono').value;
        const domicilio = document.getElementById('domicilio').value;
        const fechaVal = document.getElementById('fecha').value;

        if(!nombre || !fechaVal) return Swal.fire('Error','Nombre y Fecha son obligatorios','error');
        
        const fechaMs = new Date(fechaVal).getTime();
        const data = {
            nombre, telefono, domicilio,
            fecha: fechaMs,
            recurrencia: document.getElementById('recurrencia').value,
            estado: 'pendiente',
            unidad: document.getElementById('edit-id').value ? (servicios.find(x=>x.id===id)?.unidad || 'S/A') : 'S/A'
        };
        
        await setDoc(doc(db, "servicios", id), data, { merge: true });

        if(notificar) {
            const f = new Date(fechaMs);
            const msg = `*🆕 NUEVO SERVICIO*\n\n👤 *Cliente:* ${nombre.toUpperCase()}\n📞 *Tel:* ${telefono}\n📅 *Fecha:* ${f.toLocaleDateString()}\n⏰ *Hora:* ${f.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}\n📍 *Origen:* ${domicilio}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
        
        borradorRapido();
        Swal.fire('Guardado', 'Registro exitoso', 'success');
    }

    function borradorRapido() {
        ['edit-id', 'nombre', 'telefono', 'domicilio', 'fecha'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('btn-cancel').style.display = "none";
    }

    // --- EVENT DELEGATION (Para botones dinámicos) ---
    document.addEventListener('click', async e => {
        const t = e.target;
        if(t.classList.contains('bg-ws')) {
            const { value: uni } = await Swal.fire({ title: 'Asignar Unidad:', input: 'text' });
            if(uni) {
                await setDoc(doc(db, "servicios", t.dataset.id), { unidad: uni, estado: 'en-proceso' }, { merge: true });
                if(t.dataset.tel.length === 10) window.open(`https://wa.me/52${t.dataset.tel}?text=${encodeURIComponent('Taxi Platino: Unidad '+uni+' en camino.')}`, '_blank');
            }
        }
        if(t.classList.contains('bg-map')) {
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.dataset.dom + ' Minatitlán')}`, '_blank');
        }
        if(t.classList.contains('bg-edit')) {
            const s = servicios.find(x => x.id === t.dataset.id);
            document.getElementById('edit-id').value = s.id;
            document.getElementById('nombre').value = s.nombre;
            document.getElementById('telefono').value = s.telefono;
            document.getElementById('domicilio').value = s.domicilio;
            document.getElementById('fecha').value = new Date(s.fecha).toISOString().slice(0,16);
            document.getElementById('btn-cancel').style.display = "block";
            window.scrollTo(0,0);
        }
        if(t.classList.contains('bg-fin')) {
            await setDoc(doc(db, "servicios", t.dataset.id), { estado: 'finalizado' }, { merge: true });
        }
        if(t.classList.contains('bg-del')) {
            const res = await Swal.fire({ title: '¿Borrar?', showCancelButton: true, confirmButtonColor: '#d33' });
            if(res.isConfirmed) await deleteDoc(doc(db, "servicios", t.dataset.id));
        }
    });

    // --- INICIALIZADORES DE BOTONES ---
    document.getElementById('btnGuardar').onclick = () => procesarServicio(true);
    document.getElementById('btnLimpiar').onclick = borradorRapido;
    document.getElementById('btn-cancel').onclick = borradorRapido;
    document.getElementById('mainBody').onclick = () => {
        if(!audioHabilitado) {
            audio.play().then(() => { audio.pause(); audioHabilitado = true; });
        }
    };
    document.getElementById('btnExcel').onclick = () => {
        const ws = XLSX.utils.json_to_sheet(servicios.map(s => ({ Fecha: new Date(s.fecha).toLocaleString(), Cliente: s.nombre, Unidad: s.unidad, Estado: s.estado })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Servicios");
        XLSX.writeFile(wb, "Reporte_TaxiPlatino.xlsx");
    };
</script>
</body>
</html>
