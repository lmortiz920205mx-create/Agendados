<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Platino Admin</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body onclick="desbloquearAudio()">

<audio id="audioAlerta" src="alerta.mp3" preload="auto" loop></audio>

<button onclick="procesarServicio(true)">Guardar</button>
<button onclick="exportarExcel()">Excel</button>

<div id="lista"></div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, deleteDoc, doc, setDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, getIdTokenResult } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_DOMINIO",
    projectId: "TU_PROYECTO"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 👉 EXPONER GLOBAL
window.db = db;
window.fb = { collection, deleteDoc, doc, setDoc, onSnapshot, query, orderBy };

onAuthStateChanged(auth, async user => { 
    if (user) { 
        const token = await getIdTokenResult(user);
        window.userRole = token.claims.role || "operador";
        window.inicializarApp(); // 🔥 clave
    } else { 
        login(); 
    } 
});

async function login() {
    const { value: v } = await Swal.fire({
        title: 'Login',
        html: '<input id="u" class="swal2-input"><input id="p" type="password" class="swal2-input">',
        preConfirm: () => [u.value, p.value]
    });
    if(v) signInWithEmailAndPassword(auth, v[0], v[1]);
}
</script>

<!-- 🔥 APP -->
<script>
let servicios = [];
let audioHabilitado = false;
const audio = document.getElementById('audioAlerta');

function desbloquearAudio() {
    if(!audioHabilitado){
        audio.play().then(()=>{
            audio.pause();
            audio.currentTime = 0;
            audioHabilitado = true;
        }).catch(()=>{});
    }
}

function inicializarApp() {
    const q = fb.query(fb.collection(db, "servicios"), fb.orderBy("fecha", "asc"));
    fb.onSnapshot(q, snap => {
        servicios = [];
        snap.forEach(d => servicios.push({ ...d.data(), id: d.id }));
        render();
    });
}

function render() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    servicios.forEach(s => {
        const div = document.createElement("div");
        div.innerHTML = `
            <b>${s.nombre}</b>
            <button onclick="eliminar('${s.id}')">Eliminar</button>
        `;
        lista.appendChild(div);
    });
}

async function procesarServicio(notificar) {
    const id = Date.now().toString();

    await fb.setDoc(fb.doc(db, "servicios", id), {
        nombre: "Demo",
        fecha: Date.now(),
        estado: "pendiente"
    });

    Swal.fire("Guardado");
}

function exportarExcel() {
    const ws = XLSX.utils.json_to_sheet(servicios);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Servicios");
    XLSX.writeFile(wb, "reporte.xlsx");
}

async function eliminar(id) {
    if (window.userRole !== 'admin') {
        return Swal.fire('Sin permiso');
    }

    const r = await Swal.fire({ title: "Eliminar?", showCancelButton: true });

    if(r.isConfirmed){
        await fb.deleteDoc(fb.doc(db, "servicios", id));
    }
}

function borradorRapido(){}
function cancelarEdicion(){}
function asignarUnidad(){}
function verMapa(){}
function editar(){}
function finalizar(){}

// 🔥 SOLUCIÓN GLOBAL (CLAVE)
window.desbloquearAudio = desbloquearAudio;
window.inicializarApp = inicializarApp;
window.procesarServicio = procesarServicio;
window.exportarExcel = exportarExcel;
window.eliminar = eliminar;
window.borradorRapido = borradorRapido;
window.cancelarEdicion = cancelarEdicion;
window.asignarUnidad = asignarUnidad;
window.verMapa = verMapa;
window.editar = editar;
window.finalizar = finalizar;
</script>

</body>
</html>
