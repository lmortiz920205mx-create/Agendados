<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Platino Admin</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2b4c">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
--azul:#1a2b4c; --plata:#f4f4f4; --rojo:#d32f2f;
--amarillo:#fbc02d; --verde:#388e3c; --urgente:#ffcccc;
}

body {font-family:'Segoe UI';background:var(--plata);margin:0;padding:15px;padding-bottom:80px}
.header {text-align:center;background:var(--azul);color:#fff;padding:10px;border-radius:0 0 15px 15px;margin:-15px -15px 20px}

.form-card {background:#fff;padding:15px;border-radius:12px;margin-bottom:20px}

input,select {width:100%;padding:12px;margin:6px 0;border-radius:8px}

.btn {background:var(--azul);color:#fff;padding:12px;border:none;border-radius:8px;width:100%;margin-bottom:5px}
.ws {background:#25D366}

.servicio-card {background:#fff;margin-bottom:10px;padding:12px;border-left:6px solid}
.pendiente{border-color:var(--amarillo)}
.en-proceso{border-color:var(--verde)}
.finalizado{border-color:var(--rojo);opacity:.7}

.urgente{background:var(--urgente);animation:blink 1.5s infinite}
@keyframes blink{50%{opacity:.7}}
</style>
</head>

<body>

<audio id="audio" src="alerta.mp3"></audio>

<div class="header">
<h2>TAXI PLATINO</h2>
</div>

<div class="form-card">
<input type="hidden" id="id">
<input id="nombre" placeholder="Cliente">
<input id="telefono" placeholder="Teléfono">
<input id="domicilio" placeholder="Domicilio">
<input type="datetime-local" id="fecha">

<select id="rec">
<option value="no">Único</option>
<option value="diario">Diario</option>
</select>

<button class="btn" onclick="guardar(false)">Guardar</button>
<button class="btn ws" onclick="guardar(true)">Guardar + WhatsApp</button>
</div>

<div id="lista"></div>

<script>
let db, servicios=[];
const audio=document.getElementById("audio");
let audioOK=false;

document.body.addEventListener("click",()=>{
 if(!audioOK){audio.play().then(()=>audio.pause()); audioOK=true}
},{once:true});

indexedDB.open("TaxiDB",1).onupgradeneeded=e=>{
 e.target.result.createObjectStore("servicios",{keyPath:"id"});
};

indexedDB.open("TaxiDB").onsuccess=e=>{
 db=e.target.result;
 cargar();
 setInterval(render,60000);
};

function cargar(){
 const tx=db.transaction(["servicios"],"readonly");
 tx.objectStore("servicios").getAll().onsuccess=e=>{
  servicios=e.target.result;
  servicios.sort((a,b)=>a.estado==="finalizado"?1:a.fecha-b.fecha);
  render();
 };
}

function validarTel(t){return /^\d{10}$/.test(t)}

function guardar(ws=false){
 const id=document.getElementById("id").value;
 const nombre=document.getElementById("nombre").value.trim();
 const tel=document.getElementById("telefono").value.trim();
 const dom=document.getElementById("domicilio").value.trim();
 const fecha=document.getElementById("fecha").value;

 if(!nombre||!dom||!fecha) return Swal.fire("Error","Faltan datos","warning");
 if(tel && !validarTel(tel)) return Swal.fire("Error","Tel inválido","error");

 const old=servicios.find(s=>s.id==id)||{};

 const data={
  id:id?Number(id):Date.now()+Math.random(),
  nombre, telefono:tel||"N/A", domicilio:dom,
  fecha:new Date(fecha).getTime(),
  recurrencia:document.getElementById("rec").value,
  estado:old.estado||"pendiente",
  unidad:old.unidad||"N/A"
 };

 db.transaction(["servicios"],"readwrite").objectStore("servicios").put(data).onsuccess=()=>{
  limpiar();
  cargar();
  if(ws) enviar(data);
 };
}

function enviar(s){
 const f=new Date(s.fecha);
 const msg=`Servicio ${s.nombre} ${f.toLocaleString()} ${s.domicilio}`;
 window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

function asignar(id){
 Swal.fire({input:"text",title:"Unidad"}).then(r=>{
  if(!r.value) return;
  let s=servicios.find(x=>x.id===id);
  s.estado="en-proceso";
  s.unidad=r.value;
  db.transaction(["servicios"],"readwrite").objectStore("servicios").put(s);
  cargar();
 });
}

function finalizar(id){
 let s=servicios.find(x=>x.id===id);
 const tx=db.transaction(["servicios"],"readwrite");
 const store=tx.objectStore("servicios");

 if(s.recurrencia==="diario"){
  let f=new Date(s.fecha);
  f.setDate(f.getDate()+1);
  store.add({...s,id:Date.now()+Math.random(),fecha:f.getTime(),estado:"pendiente",unidad:"N/A"});
 }

 s.estado="finalizado";
 store.put(s);
 tx.oncomplete=cargar;
}

function eliminar(id){
 db.transaction(["servicios"],"readwrite").objectStore("servicios").delete(id);
 cargar();
}

function limpiar(){
 document.querySelectorAll("input").forEach(i=>i.value="");
}

function esc(t){return t.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}

function render(){
 const lista=document.getElementById("lista");
 lista.innerHTML="";
 const now=Date.now();
 const lim=now+15*60000;
 let urg=false;

 servicios.forEach(s=>{
  const esUrg=s.estado!=="finalizado" && s.fecha>now && s.fecha<=lim;
  if(esUrg) urg=true;

  const div=document.createElement("div");
  div.className=`servicio-card ${s.estado} ${esUrg?"urgente":""}`;
  div.innerHTML=`
  <b>${esc(s.nombre)}</b><br>
  ${new Date(s.fecha).toLocaleString()}<br>
  ${esc(s.domicilio)}<br>
  Unidad:${s.unidad}<br>
  <button onclick="asignar(${s.id})">Unidad</button>
  <button onclick="finalizar(${s.id})">Fin</button>
  <button onclick="eliminar(${s.id})">X</button>
  `;
  lista.appendChild(div);
 });

 if(urg && audioOK) audio.play().catch(()=>{});
}

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
