<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taxi Platino Admin</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2b4c">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
    --azul:#1a2b4c;
    --verde:#2e7d32;
    --rojo:#c62828;
    --amarillo:#f9a825;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}

/* HEADER */
.header{
    background:var(--azul);
    color:white;
    text-align:center;
    padding:15px;
    border-radius:0 0 15px 15px;
    margin:-15px -15px 15px -15px;
}

/* FORM */
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BOTONES */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:5px;
    font-weight:bold;
    cursor:pointer;
}

.btn-main{ background:var(--azul); color:white; }
.btn-green{ background:var(--verde); color:white; }
.btn-red{ background:var(--rojo); color:white; }
.btn-yellow{ background:var(--amarillo); }

/* LISTA */
.servicio{
    background:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    border-left:6px solid;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.pendiente{ border-color:var(--amarillo); }
.proceso{ border-color:var(--verde); }
.finalizado{ border-color:var(--rojo); opacity:0.7; }

.acciones{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:5px;
    margin-top:10px;
}

small{ color:#666; }
</style>
</head>

<body>

<div class="header">
    <h2>TAXI PLATINO</h2>
    <small>Panel de Operaciones</small>
</div>

<div class="card">
    <input id="nombre" placeholder="👤 Cliente">
    <input id="telefono" placeholder="📱 Teléfono">
    <input id="domicilio" placeholder="📍 Dirección">
    <input type="datetime-local" id="fecha">

    <button class="btn btn-main" onclick="procesarServicio()">💾 Guardar Servicio</button>
</div>

<div id="lista"></div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCV432quSSYBQnvyVNoc7rXhw99x7UlMHg",
  authDomain: "taxi-platino-95ea3.firebaseapp.com",
  projectId: "taxi-platino-95ea3",
  storageBucket: "taxi-platino-95ea3.firebasestorage.app",
  messagingSenderId: "981982270950",
  appId: "1:981982270950:web:b7d0b4ca9ab03cafd97227"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const serviciosRef = collection(db, "servicios");

let servicios = [];

// 🔄 TIEMPO REAL
onSnapshot(serviciosRef, (snapshot)=>{
    servicios = [];
    snapshot.forEach(docSnap=>{
        servicios.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    // ordenar por fecha
    servicios.sort((a,b)=> new Date(a.fecha) - new Date(b.fecha));

    render();
});

// 💾 GUARDAR
window.procesarServicio = async ()=>{
    const nombre = nombreInput.value;
    const telefono = telefonoInput.value;
    const domicilio = domicilioInput.value;
    const fecha = fechaInput.value;

    if(!nombre || !domicilio || !fecha){
        return Swal.fire('Faltan datos');
    }

    await addDoc(serviciosRef,{
        nombre,
        telefono,
        domicilio,
        fecha,
        estado:'pendiente',
        unidad:'N/A'
    });

    nombreInput.value="";
    telefonoInput.value="";
    domicilioInput.value="";
    fechaInput.value="";
};

// 🚕 UNIDAD
window.asignar = async(id)=>{
    const { value } = await Swal.fire({
        title:"Asignar unidad",
        input:"text"
    });

    if(value){
        await updateDoc(doc(db,"servicios",id),{
            unidad:value,
            estado:"proceso"
        });
    }
};

// ✅ FINALIZAR
window.finalizar = async(id)=>{
    await updateDoc(doc(db,"servicios",id),{
        estado:"finalizado"
    });
};

// ❌ ELIMINAR
window.eliminar = async(id)=>{
    const res = await Swal.fire({title:"¿Eliminar?", showCancelButton:true});
    if(res.isConfirmed){
        await deleteDoc(doc(db,"servicios",id));
    }
};

// 🎨 RENDER
function render(){
    lista.innerHTML="";

    servicios.forEach(s=>{
        const div=document.createElement("div");

        div.className=`servicio ${s.estado}`;

        div.innerHTML=`
            <b>${s.nombre}</b><br>
            <small>📍 ${s.domicilio}</small><br>
            <small>📅 ${new Date(s.fecha).toLocaleString()}</small><br>
            <small>🚕 ${s.unidad}</small>

            <div class="acciones">
                <button class="btn btn-green" onclick="asignar('${s.id}')">Unidad</button>
                <button class="btn btn-yellow" onclick="finalizar('${s.id}')">Finalizar</button>
                <button class="btn btn-red" onclick="eliminar('${s.id}')">Eliminar</button>
            </div>
        `;

        lista.appendChild(div);
    });
}

</script>

</body>
</html>
