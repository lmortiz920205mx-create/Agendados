<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Platino Admin</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="theme-color" content="#1a2b4c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body id="mainBody">
    <div id="loader">
        <div class="loader-box">
            <h2>TAXI PLATINO</h2>
            <p>Cargando sistema...</p>
        </div>
    </div>

    <audio id="audioAlerta" src="alerta.mp3" preload="auto"></audio>

    <div id="app-content">
        <div class="header">
            <button id="btnLogout" class="header-btn">🚪</button>
            <h2 style="margin:0">TAXI PLATINO</h2>
            <small>CENTRAL MINATITLÁN</small><br>
            <small id="rolUser"></small>
            <button id="btnSonido" class="header-btn">🔇</button>
        </div>

        <button id="btnRol" class="btn-main" style="background:#6c5ce7;">👑 REGISTRAR OPERADOR</button>

        <div class="form-card" id="formulario">
            <input type="hidden" id="edit-id">
            <input type="text" id="nombre" placeholder="Nombre del Cliente">
            <input type="tel" id="telefono" placeholder="📱 WhatsApp (10 dígitos)" maxlength="10">
            <input type="text" id="domicilio" placeholder="📍 Domicilio de Origen">
            <div style="display: flex; gap: 10px;">
                <input type="datetime-local" id="fecha" style="flex: 2;">
                <select id="recurrencia" style="flex: 1.5;">
                    <option value="no">Servicio Único</option>
                    <option value="diario">Repetir cada 24h</option>
                </select>
            </div>

            <div id="bloqueRecurrencia" class="bloque-rec">
                <div id="diasSemana" class="dias-container">
                    <label class="dia"><input type="checkbox" value="1"><span>L</span></label>
                    <label class="dia"><input type="checkbox" value="2"><span>M</span></label>
                    <label class="dia"><input type="checkbox" value="3"><span>Mi</span></label>
                    <label class="dia"><input type="checkbox" value="4"><span>J</span></label>
                    <label class="dia"><input type="checkbox" value="5"><span>V</span></label>
                    <label class="dia"><input type="checkbox" value="6"><span>S</span></label>
                    <label class="dia"><input type="checkbox" value="0"><span>D</span></label>
                </div>
                
                <small id="resumenDias"></small>
            </div>

            <div class="divider"></div>

<button class="btn-main btn-save" id="btnGuardar">💾 GUARDAR Y NOTIFICAR</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-main btn-excel" id="btnExcel">📊 EXCEL</button>
                <button class="btn-main btn-clear" id="btnLimpiar">🧹 LIMPIAR</button>
            </div>
            <button id="btn-cancel" style="display:none; color:red; width:100%; margin-top:10px; border:none; background:none; font-weight:bold; cursor:pointer;">✖ CANCELAR EDICIÓN</button>
        </div>

        <input type="text" id="searchBar" placeholder="🔍 Buscar por nombre o domicilio...">

        <div id="tabs" style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="tab-btn active" data-tab="pendiente">🟡 Pendientes</button>
            <button class="tab-btn" data-tab="en-proceso">🟢 En proceso</button>
            <button class="tab-btn" data-tab="finalizado">⚫ Finalizados</button>
        </div>

    <div class="servicio-card">
                <div id="lista"></div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
