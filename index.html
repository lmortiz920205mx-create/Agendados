<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Platino Cloud</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2b4c">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --azul: #1a2b4c; --plata: #f4f4f4; --rojo: #d32f2f; --verde: #2e7d32; --amarillo: #fbc02d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--plata); margin: 0; padding: 15px; padding-bottom: 80px; }
        .header { text-align: center; background: var(--azul); color: white; padding: 10px; border-radius: 0 0 15px 15px; margin: -15px -15px 20px -15px; }
        .form-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 4px solid var(--azul); }
        input, select { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn-group-ws { background: #25D366; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        .servicio-card { background: white; margin-bottom: 12px; border-radius: 10px; padding: 15px; border-left: 8px solid var(--amarillo); position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; }
        .estado-proceso { border-left-color: var(--verde) !important; background-color: #e8f5e9; }
        .estado-finalizado { border-left-color: var(--rojo) !important; opacity: 0.5; }
        
        .badge-camino { background: var(--verde); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-top: 8px; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .time-tag { font-size: 0.85em; color: #555; font-weight: 700; display: block; margin-bottom: 4px; }
        .acciones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 12px; }
        .btn-acc { padding: 10px 2px; border: none; border-radius: 6px; color: white; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .bg-ws { background: #25D366; } .bg-map { background: #4285F4; } .bg-fin { background: var(--rojo); } .bg-del { background: #333; }
        
        .urgente { border-left-color: #ff0000 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { border-left-color: transparent; } }
    </style>
</head>
<body>

<audio id="alertaSonido" src="alerta.mp3" preload="auto"></audio>

<div class="header">
    <h2>TAXI PLATINO</h2>
    <small>OPERACIONES EN LA NUBE</small>
</div>

<div class="form-card" id="formulario">
    <h3 id="form-title" style="margin:0 0 10px 0; color:var(--azul)">Agendar Servicio</h3>
    <input type="hidden" id="edit-id">
    
    <input list="agenda" id="nombre" placeholder="Nombre del Cliente" oninput="checarAgenda()">
    <datalist id="agenda"></datalist>
    <input type="hidden" id="telefono">
    
    <input type="text" id="domicilio" placeholder="📍 Domicilio de Recolección">
    <input type="datetime-local" id="fecha">
    
    <button class="btn-group-ws" onclick="guardarYEnviar()">✅ GUARDAR Y REPORTAR A GRUPO</button>
    <button id="btn-cancel" style="display:none; background:none; border:none; color:red; width:100%; margin-top:10px;" onclick="cancelarEdicion()">✖ Cancelar</button>
</div>

<div id="lista"></div>

<script>
    // 1. CONFIGURACIÓN DE FIREBASE (Tus credenciales aplicadas)
    const firebaseConfig = { 
        apiKey: "AIzaSyAGBxPgjntYqcDxygmpKU74dnyTZlGs2BU", 
        authDomain: "taxi-platino-52c12.firebaseapp.com", 
        databaseURL: "https://taxi-platino-52c12-default-rtdb.firebaseio.com",
        projectId: "taxi-platino-52c12", 
        storageBucket: "taxi-platino-52c12.firebasestorage.app", 
        messagingSenderId: "85770716077", 
        appId: "1:85770716077:web:79751d566d4094b6f35724"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. AGENDA DE CONTACTOS
    const agendaContactos = {
        "Juan Perez": "9221112233",
        "Maria Sosa": "9214445566"
    };

    function cargarAgendaUI() {
        const dl = document.getElementById('agenda');
        Object.keys(agendaContactos).forEach(nombre => {
            let opt = document.createElement('option');
            opt.value = nombre;
            dl.appendChild(opt);
        });
    }

    function checarAgenda() {
        const nombre = document.getElementById('nombre').value;
        document.getElementById('telefono').value = agendaContactos[nombre] || "N/A";
    }

    // 3. LOGICA DE DATOS
    function guardarYEnviar() {
        const id = document.getElementById('edit-id').value || Date.now();
        const nombre = document.getElementById('nombre').value;
        const tel = document.getElementById('telefono').value;
        const dom = document.getElementById('domicilio').value;
        const fec = document.getElementById('fecha').value;

        if(!nombre || !dom || !fec) return Swal.fire('Error', 'Completa los campos', 'error');

        const datos = {
            id, nombre, tel, dom, fec,
            estado: 'pendiente',
            unidad: 'N/A'
        };

        db.ref('servicios/' + id).set(datos).then(() => {
            const h = fec.split('T')[1];
            const msg = `*NUEVO:* ${nombre}\n*HORA:* ${h}\n*UBIC:* ${dom}\n*TEL:* ${tel}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
            cancelarEdicion();
        });
    }

    db.ref('servicios').on('value', (snapshot) => {
        render(snapshot.val());
    });

    function render(data) {
        const lista = document.getElementById('lista');
        lista.innerHTML = '<h3 style="margin-left:10px; color:#555">Hoja de Ruta</h3>';
        if(!data) return;

        const ahora = new Date();
        const prox15 = new Date(ahora.getTime() + 15 * 60000);

        Object.values(data).sort((a,b) => new Date(a.fec) - new Date(b.fec)).forEach(s => {
            const f = new Date(s.fec);
            const esProceso = s.estado === 'proceso';
            const esUrgente = s.estado === 'pendiente' && f <= prox15 && f > ahora;
            
            if(esUrgente) document.getElementById('alertaSonido').play().catch(()=>{});

            const div = document.createElement('div');
            div.className = `servicio-card ${esProceso ? 'estado-proceso' : ''} ${s.estado === 'finalizado' ? 'estado-finalizado' : ''} ${esUrgente ? 'urgente' : ''}`;
            
            div.innerHTML = `
                <span class="time-tag">⏰ ${f.toLocaleDateString()} - ${f.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                <strong style="font-size:1.1em">${s.nombre}</strong>
                <div style="color:#444">📍 ${s.dom}</div>
                ${esProceso ? `<div class="badge-camino">🚖 UNIDAD EN CAMINO: ${s.unidad}</div>` : `<div>🚕 Unidad: ${s.unidad}</div>`}
                
                <div class="acciones">
                    <button class="btn-acc bg-ws" onclick="asignarUnidad('${s.id}')">Unidad</button>
                    <button class="btn-acc bg-map" onclick="window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('${s.dom}'))">Maps</button>
                    <button class="btn-acc bg-fin" onclick="finalizar('${s.id}')">Fin</button>
                    <button class="btn-acc bg-del" onclick="eliminar('${s.id}')">X</button>
                </div>
            `;
            lista.appendChild(div);
        });
    }

    function asignarUnidad(id) {
        Swal.fire({ title: 'Número de Taxi', input: 'text', confirmButtonColor: '#1a2b4c', showCancelButton: true }).then(res => {
            if(res.value) db.ref('servicios/' + id).update({ unidad: res.value, estado: 'proceso' });
        });
    }

    function finalizar(id) { db.ref('servicios/' + id).update({ estado: 'finalizado' }); }
    function eliminar(id) { db.ref('servicios/' + id).remove(); }
    
    function cancelarEdicion() {
        document.getElementById('edit-id').value = "";
        document.getElementById('nombre').value = "";
        document.getElementById('telefono').value = "";
        document.getElementById('domicilio').value = "";
        document.getElementById('fecha').value = "";
        document.getElementById('btn-cancel').style.display = "none";
    }

    cargarAgendaUI();
</script>
</body>
</html>
