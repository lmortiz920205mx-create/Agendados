<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Platino Admin</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2b4c">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* 🔵 MISMO DISEÑO ORIGINAL (sin cambios) */
:root {
    --azul: #1a2b4c; --plata: #f4f4f4; --rojo: #d32f2f;
    --amarillo: #fbc02d; --verde: #388e3c; --texto: #333;
    --urgente: #ffcccc;
}
body { font-family: 'Segoe UI', sans-serif; background: var(--plata); margin: 0; padding: 15px; padding-bottom: 80px; }
.header { text-align: center; background: var(--azul); color: white; padding: 10px; border-radius: 0 0 15px 15px; margin: -15px -15px 20px -15px; }
.form-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid var(--azul); }
input, select { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; }
.btn-main { background: var(--azul); color: white; padding: 15px; width: 100%; border-radius: 8px; margin-bottom: 5px; }
.btn-group-ws { background: #25D366; }
.btn-excel { background: #1D6F42; }
.btn-clear { background: #555; }

.servicio-card { background: white; margin-bottom: 12px; border-radius: 10px; padding: 15px; border-left: 8px solid; }
.pendiente { border-left-color: var(--amarillo); background: #fffde7; }
.en-proceso { border-left-color: var(--verde); background: #f1f8e9; }
.finalizado { border-left-color: var(--rojo); background: #ffebee; opacity: 0.8; }

.urgente-blink {
    border-left-color: #ff0000 !important;
    background-color: var(--urgente) !important;
    animation: blinker 1.5s linear infinite;
}
@keyframes blinker { 50% { opacity: 0.7; } }

.acciones { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 12px; }
.btn-acc { padding: 8px 2px; border-radius: 6px; color: white; font-size: 9px; }
.bg-ws { background: #25D366; } .bg-map { background: #4285F4; }
.bg-edit { background: #607d8b; } .bg-fin { background: var(--rojo); } .bg-del { background: #333; }

.save-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>

<body>

<audio id="audioAlerta" src="alerta.mp3"></audio>

<div class="header">
<h2>TAXI PLATINO</h2>
<small>OPERACIONES</small>
</div>

<div class="form-card">
<input type="hidden" id="edit-id">
<input type="text" id="nombre" placeholder="Nombre del Cliente">
<input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)">
<input type="text" id="domicilio" placeholder="Domicilio">
<input type="datetime-local" id="fecha">

<select id="recurrencia">
<option value="no">Servicio Único</option>
<option value="diario">🔁 Diario</option>
</select>

<div class="save-buttons">
<button class="btn-main" onclick="guardar(false)">GUARDAR</button>
<button class="btn-main btn-group-ws" onclick="guardar(true)">GUARDAR Y REPORTAR</button>
</div>

<button class="btn-main btn-excel" onclick="exportarExcel()">📊 EXCEL</button>
<button class="btn-main btn-clear" onclick="limpiarFinalizados()">🧹 LIMPIAR</button>
</div>

<div id="lista"></div>

<script>
/* 🔥 FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCV432quSSYBQnvyVNoc7rXhw99x7UlMHg",
authDomain: "taxi-platino-95ea3.firebaseapp.com",
projectId: "taxi-platino-95ea3",
storageBucket: "taxi-platino-95ea3.firebasestorage.app",
messagingSenderId: "981982270950",
appId: "1:981982270950:web:b7d0b4ca9ab03cafd97227"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let servicios = [];
const audio = document.getElementById('audioAlerta');

/* 🔄 TIEMPO REAL */
db.collection("servicios").onSnapshot(snapshot => {
    servicios = [];
    snapshot.forEach(doc => servicios.push(doc.data()));
    render();
});

/* 💾 GUARDAR */
function guardar(grupo=false){
    const id = document.getElementById('edit-id').value || Date.now();
    const nombre = nombreInput.value;
    const telefono = telefonoInput.value;
    const domicilio = domicilioInput.value;
    const fecha = fechaInput.value;
    const recurrencia = recurrenciaInput.value;

    if(!nombre || !domicilio || !fecha){
        return Swal.fire('Error','Faltan datos','warning');
    }

    const data = {
        id: Number(id),
        nombre, telefono, domicilio, fecha, recurrencia,
        estado: 'pendiente',
        unidad: 'N/A'
    };

    db.collection("servicios").doc(String(id)).set(data);

    if(grupo) enviarGrupo(data);

    limpiarForm();
}

/* 📲 WHATSAPP */
function enviarGrupo(s){
    const msg = `Nuevo servicio\n${s.nombre}\n${s.domicilio}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* 🚕 ASIGNAR */
async function asignar(id){
    const { value } = await Swal.fire({input:'text', title:'Unidad'});
    if(!value) return;

    const s = servicios.find(x=>x.id===id);
    s.estado = 'en-proceso';
    s.unidad = value;

    db.collection("servicios").doc(String(id)).set(s);
}

/* ✅ FINALIZAR */
function finalizar(id){
    const s = servicios.find(x=>x.id===id);

    if(s.recurrencia==='diario'){
        const nueva = {...s};
        nueva.id = Date.now();
        const f = new Date(s.fecha);
        f.setDate(f.getDate()+1);
        nueva.fecha = f.toISOString().slice(0,16);
        nueva.estado='pendiente';
        db.collection("servicios").doc(String(nueva.id)).set(nueva);
    }

    s.estado='finalizado';
    db.collection("servicios").doc(String(id)).set(s);
}

/* 🗑️ ELIMINAR */
function eliminar(id){
    db.collection("servicios").doc(String(id)).delete();
}

/* 🧹 LIMPIAR */
function limpiarFinalizados(){
    servicios.filter(s=>s.estado==='finalizado')
    .forEach(s=>db.collection("servicios").doc(String(s.id)).delete());
}

/* 📊 EXCEL */
function exportarExcel(){
    const ws = XLSX.utils.json_to_sheet(servicios);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Servicios");
    XLSX.writeFile(wb, "reporte.xlsx");
}

/* 🎨 RENDER */
function render(){
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    let urgente = false;
    const now = new Date();
    const limite = new Date(now.getTime()+15*60000);

    servicios.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

    servicios.forEach(s=>{
        const f = new Date(s.fecha);
        const esUrgente = s.estado!=='finalizado' && f<=limite && f>now;
        if(esUrgente) urgente=true;

        const div = document.createElement('div');
        div.className=`servicio-card ${s.estado} ${esUrgente?'urgente-blink':''}`;
        div.innerHTML=`
        <strong>${s.nombre}</strong>
        <div>${s.domicilio}</div>
        <div>Unidad: ${s.unidad}</div>
        <div class="acciones">
        <button class="btn-acc bg-ws" onclick="asignar(${s.id})">Unidad</button>
        <button class="btn-acc bg-map" onclick="window.open('https://maps.google.com/?q=${s.domicilio}')">Map</button>
        <button class="btn-acc bg-fin" onclick="finalizar(${s.id})">Fin</button>
        <button class="btn-acc bg-del" onclick="eliminar(${s.id})">Del</button>
        </div>`;
        lista.appendChild(div);
    });

    if(urgente){
        audio.play().catch(()=>{});
        navigator.vibrate?.([200,100,200]);
    }
}

/* 🧼 LIMPIAR FORM */
function limpiarForm(){
    document.getElementById('edit-id').value='';
    document.getElementById('nombre').value='';
    document.getElementById('telefono').value='';
    document.getElementById('domicilio').value='';
    document.getElementById('fecha').value='';
}
</script>

</body>
</html>
